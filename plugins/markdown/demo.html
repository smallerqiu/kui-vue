    <h1>Table</h1>
<p>Display row and column data.</p>
<h2 id="when-to-use" tabindex="-1"><a class="header-anchor" href="#when-to-use">When to Use</a></h2>
<ul>
<li>When there is a large amount of structured data to display.</li>
<li>When complex behaviors such as sorting, searching, pagination, and custom operations are needed on the data.</li>
</ul>
<h2 id="simple-example" tabindex="-1"><a class="header-anchor" href="#simple-example">Simple Example</a></h2>
<p>Specify the table's data source data as an array.</p>
<pre><code class="hljs language-js"><span class="hljs-keyword">const</span> dataSource = [
  {
    <span class="hljs-attr">key</span>: <span class="hljs-string">&#x27;1&#x27;</span>,
    <span class="hljs-attr">name</span>: <span class="hljs-string">&#x27;Li Lei&#x27;</span>,
    <span class="hljs-attr">age</span>: <span class="hljs-number">32</span>,
    <span class="hljs-attr">address</span>: <span class="hljs-string">&#x27;Wu Han Guanggu No. 328&#x27;</span>,

  {
    <span class="hljs-attr">key</span>: <span class="hljs-string">&#x27;2&#x27;</span>,
    <span class="hljs-attr">name</span>: <span class="hljs-string">&#x27;Hu Cong&#x27;</span>,
    <span class="hljs-attr">age</span>: <span class="hljs-number">28</span>,
    <span class="hljs-attr">address</span>: <span class="hljs-string">&#x27;Wu Han Guanggu No. 198&#x27;</span>,
  },
];

<span class="hljs-keyword">const</span> columns = [
  {
    <span class="hljs-attr">title</span>: <span class="hljs-string">&#x27;Name&#x27;</span>,
    <span class="hljs-attr">key</span>: <span class="hljs-string">&#x27;name&#x27;</span>,

  {
    <span class="hljs-attr">title</span>: <span class="hljs-string">&#x27;Age&#x27;</span>,
    <span class="hljs-attr">key</span>: <span class="hljs-string">&#x27;age&#x27;</span>,
  },
  {
    <span class="hljs-attr">title</span>: <span class="hljs-string">&#x27;Address&#x27;</span>,
    <span class="hljs-attr">key</span>: <span class="hljs-string">&#x27;address&#x27;</span>,
  },
];

<span class="language-xml"><span class="hljs-tag">&lt;<span class="hljs-name">Table</span> <span class="hljs-attr">:data</span>=<span class="hljs-string">&quot;dataSource&quot;</span> <span class="hljs-attr">:columns</span>=<span class="hljs-string">&quot;columns&quot;</span> /&gt;</span></span>;
</code></pre>

<h2 id="table-api" tabindex="-1"><a class="header-anchor" href="#table-api">Table API</a></h2>
<table>
<thead>
<tr>
<th>Property</th>
<th>Description</th>
<th>Type</th>
<th>Default</th>
</tr>
</thead>
<tbody>
<tr>
<td>bordered</td>
<td>Whether to display borders</td>
<td>Boolean</td>
<td>false</td>
</tr>
<tr>
<td>checkable</td>
<td>Whether to show checkboxes</td>
<td>Boolean</td>
<td>false</td>
</tr>
<tr>
<td>v-model:selectedKeys</td>
<td>Collection of selected keys</td>
<td>Array</td>
<td>false</td>
</tr>
<tr>
<td>size</td>
<td>Display compact mode when the value is <code>small</code></td>
<td>String</td>
<td>-</td>
</tr>
<tr>
<td>emptyText</td>
<td>Prompt displayed when there is no data</td>
<td>String</td>
<td>No Data</td>
</tr>
<tr>
<td>loading</td>
<td>Table asynchronous loading mode</td>
<td>Boolean</td>
<td>false</td>
</tr>
<tr>
<td>data</td>
<td>Structured data to be displayed</td>
<td>Array</td>
<td>[]</td>
</tr>
<tr>
<td>columns</td>
<td>Configuration description of table columns</td>
<td>Array</td>
<td>[]</td>
</tr>
<tr>
<td>rowKey</td>
<td>Basis for selection</td>
<td>String</td>
<td>key</td>
</tr>
<tr>
<td>onRowClick</td>
<td>Triggered when clicking a row</td>
<td>Function</td>
<td>-</td>
</tr>
<tr>
<td>onSort</td>
<td>Triggered when clicking to sort</td>
<td>Function({key,order})</td>
<td>-</td>
</tr>
<tr>
<td>striped</td>
<td>Whether to display zebra stripes</td>
<td>Boolean</td>
<td>-</td>
</tr>
</tbody>
</table>
