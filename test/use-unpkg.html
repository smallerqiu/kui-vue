  <head>
    <meta charset="UTF-8" />

  <body>
    <div id="app">
      <k-button @click="show">Click me!</k-button>
      <Modal v-model="visible" title="Welcome">Welcome to use kui</Modal>
    </div>
  </body>
  <script>
    const { createApp, ref } = Vue;
    createApp({
      setup() {
        const message = ref("你好，Vue CDN!");
        const visible = ref(false);
        const show = () => {
          visible.value = true;
        };
        return {
          visible,
          message,
          show,
        };
      },
    })
      .use(kui)
      .mount("#app");
  </script>
